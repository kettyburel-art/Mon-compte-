<style>
:root {
  --petal-white:#fdfaf8; --petal-pink:#f2c4ce; --petal-rose:#e8899a;
  --blossom-deep:#c45c78; --leaf-light:#a8c89a; --leaf-dark:#5a8a5a;
  --leaf-mid:#7aab72; --pistil:#d4a843; --bark:#6b4c3b; --bark-light:#9b7060;
  --bg:#faf6f3; --bg2:#f5ede8; --text:#3a2820; --muted:rgba(58,40,32,0.45);
  --card:#fff; --night:#3a2030;
  --tdah:#7c5cbf; --tdah-light:#ede8f8; --tdah-mid:#a98de0;
  --dopamine:#e07840;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:5rem}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 10% 20%,rgba(242,196,206,0.18) 0%,transparent 50%),radial-gradient(ellipse at 90% 10%,rgba(168,200,154,0.12) 0%,transparent 45%),radial-gradient(ellipse at 50% 80%,rgba(124,92,191,0.06) 0%,transparent 50%);pointer-events:none;z-index:0}

/* HEADER */
.header{background:linear-gradient(160deg,#3a2030 0%,#4a2848 60%,#6a3468 100%);padding:1rem 1.2rem 0.8rem;position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(58,32,48,0.3);overflow:hidden}
.header::before{content:'🌸';position:absolute;right:-0.5rem;top:-0.5rem;font-size:5rem;opacity:0.08;transform:rotate(-15deg);pointer-events:none}
.header h1{font-family:'Cormorant Garamond',serif;font-size:1.25rem;color:#fff;font-weight:400;letter-spacing:0.02em}
.header h1 em{color:var(--petal-pink);font-style:italic}
.header h1 .tdah-badge{font-family:'Nunito',sans-serif;font-size:0.6rem;background:rgba(124,92,191,0.3);color:#d4c4f8;padding:0.15rem 0.45rem;border-radius:2rem;vertical-align:middle;margin-left:0.3rem;font-weight:700;letter-spacing:0.05em}
.header-sub{font-size:0.58rem;color:rgba(255,255,255,0.38);letter-spacing:0.12em;text-transform:uppercase;margin-top:0.1rem}

/* Budget */
.budget-bar{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:0.6rem 0.9rem;margin-top:0.65rem;display:flex;align-items:center;gap:0.75rem}
.budget-label{font-size:0.6rem;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap}
.budget-track{flex:1;background:rgba(255,255,255,0.1);border-radius:2rem;height:5px;overflow:hidden}
.budget-fill{height:100%;border-radius:2rem;background:linear-gradient(90deg,var(--leaf-light),var(--petal-pink));transition:width 0.5s}
.budget-amount{font-size:0.7rem;color:#fff;font-weight:700;white-space:nowrap}
.budget-amount span{color:var(--petal-pink)}

/* Alert */
.alert-bar{background:linear-gradient(90deg,rgba(242,196,206,0.2),rgba(124,92,191,0.08));border-left:3px solid var(--petal-rose);margin:0.7rem 1rem 0;padding:0.55rem 0.9rem;border-radius:0 10px 10px 0;font-size:0.7rem;line-height:1.6;position:relative;z-index:1}
.alert-bar strong{color:var(--blossom-deep)}

/* IMPULSION RAPIDE — toujours visible */
.impulse-bar{
  margin:0.7rem 1rem 0;
  background:linear-gradient(135deg,var(--tdah-light),rgba(255,255,255,0.8));
  border:1.5px solid rgba(124,92,191,0.2);
  border-radius:14px;padding:0.7rem 0.9rem;
  position:relative;z-index:1;
}
.impulse-bar-title{
  font-size:0.62rem;font-weight:700;
  text-transform:uppercase;letter-spacing:0.08em;
  color:var(--tdah);margin-bottom:0.5rem;
  display:flex;align-items:center;gap:0.3rem;
}
.impulse-options{display:flex;gap:0.4rem;flex-wrap:wrap}
.imp-btn{
  flex:1;min-width:80px;
  background:#fff;border:1.5px solid rgba(124,92,191,0.15);
  border-radius:10px;padding:0.45rem 0.4rem;
  text-align:center;cursor:pointer;
  font-size:0.65rem;font-weight:700;color:var(--tdah);
  transition:all 0.15s;line-height:1.3;
}
.imp-btn:active{transform:scale(0.96);background:var(--tdah-light)}
.imp-btn .imp-icon{font-size:1.1rem;display:block;margin-bottom:0.15rem}

/* Nav tabs */
.nav-tabs{display:flex;gap:0;margin:0.75rem 1rem 0;background:rgba(58,40,32,0.06);border-radius:12px;padding:0.2rem;position:relative;z-index:1}
.nav-tab{flex:1;text-align:center;padding:0.48rem 0.15rem;font-size:0.62rem;font-weight:700;color:var(--muted);border-radius:9px;cursor:pointer;transition:all 0.2s;letter-spacing:0.02em}
.nav-tab.active{background:linear-gradient(135deg,var(--blossom-deep),#904868);color:#fff;box-shadow:0 2px 10px rgba(196,92,120,0.3)}

/* CALENDAR */
.calendar-section{padding:0.8rem 1rem 0;position:relative;z-index:1}
.cal-month-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.9rem}
.cal-month-header h2{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;color:var(--text)}
.cal-budget-badge{font-size:0.66rem;font-weight:700;padding:0.25rem 0.7rem;border-radius:2rem;background:rgba(90,138,90,0.12);color:var(--leaf-dark);border:1px solid rgba(90,138,90,0.2)}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:0.2rem;margin-bottom:0.3rem}
.cal-wd{text-align:center;font-size:0.52rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;padding:0.2rem 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0.28rem}
.cal-day{aspect-ratio:1;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:0.78rem;font-weight:700;color:var(--text);background:var(--card);transition:all 0.18s;position:relative;box-shadow:0 1px 4px rgba(58,40,32,0.06);border:1.5px solid transparent}
.cal-day:active{transform:scale(0.92)}
.cal-day.empty{background:transparent;box-shadow:none;cursor:default;border:none}
.cal-day.no-menu{background:rgba(58,40,32,0.03);color:var(--muted);cursor:default;box-shadow:none}
.cal-day .cal-dot{width:4px;height:4px;border-radius:50%;margin-top:0.12rem}
.cal-day.has-menu .cal-dot{background:var(--leaf-mid)}
.cal-day.has-menu{border-color:rgba(122,171,114,0.2)}
.cal-day.livraison{border-color:var(--bark-light);background:linear-gradient(135deg,#fff8f5,#fff)}
.cal-day.batch-day{border-color:var(--pistil);background:linear-gradient(135deg,#fffbf0,#fff)}
.cal-day.birthday{background:linear-gradient(135deg,#fff0f4,#fdf5f8);border-color:var(--petal-rose)}
.cal-day.birthday .cal-dot{background:var(--petal-rose)}
.cal-day.active-day{background:linear-gradient(135deg,var(--blossom-deep),#a04060);color:#fff;border-color:var(--blossom-deep);box-shadow:0 4px 16px rgba(196,92,120,0.3)}
.cal-day.active-day .cal-dot{background:rgba(255,255,255,0.7)}
.cal-icon{font-size:0.6rem;margin-top:0.08rem}
.week-sep{grid-column:1/-1;height:1px;background:linear-gradient(90deg,transparent,rgba(242,196,206,0.4),transparent);margin:0.1rem 0}

/* Legend */
.cal-legend{display:flex;flex-wrap:wrap;gap:0.5rem;margin:0.75rem 1rem 0;font-size:0.62rem;color:var(--muted);position:relative;z-index:1}
.leg{display:flex;align-items:center;gap:0.3rem}
.ld{width:8px;height:8px;border-radius:3px}
.ld-g{background:var(--leaf-mid)}.ld-l{background:var(--bark-light)}.ld-b{background:var(--pistil)}.ld-bday{background:var(--petal-rose)}

/* OVERLAY & PANEL */
.overlay{position:fixed;inset:0;background:rgba(58,32,48,0.45);backdrop-filter:blur(3px);z-index:150;opacity:0;pointer-events:none;transition:opacity 0.3s}
.overlay.show{opacity:1;pointer-events:all}
.day-panel{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-radius:24px 24px 0 0;box-shadow:0 -8px 40px rgba(58,32,48,0.2);transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0,0.67,1);z-index:200;max-height:88vh;overflow-y:auto}
.day-panel.open{transform:translateY(0)}
.panel-handle{width:40px;height:4px;background:rgba(58,40,32,0.12);border-radius:2px;margin:0.75rem auto 0}
.panel-close{position:absolute;right:1rem;top:0.8rem;width:30px;height:30px;border-radius:50%;background:rgba(58,40,32,0.07);border:none;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted)}

/* Panel header */
.panel-header{padding:0.3rem 1.2rem 0.7rem}
.panel-date{font-size:0.58rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);font-weight:700}
.panel-title{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:600;color:var(--text);margin-top:0.2rem;line-height:1.25}
.panel-mode{display:inline-block;font-family:'Nunito',sans-serif;font-size:0.6rem;font-weight:700;padding:0.2rem 0.65rem;border-radius:2rem;margin-top:0.3rem;letter-spacing:0.04em}
.pm-l{background:rgba(155,112,96,0.1);color:var(--bark)}
.pm-b{background:rgba(212,168,67,0.12);color:#8a6800}
.pm-f{background:rgba(90,138,90,0.1);color:var(--leaf-dark)}
.pm-bday{background:rgba(232,137,154,0.12);color:var(--blossom-deep)}

/* Next meal banner */
.next-meal-bar{
  margin:0 1rem 0.65rem;
  background:linear-gradient(135deg,rgba(124,92,191,0.08),rgba(212,168,67,0.06));
  border:1px solid rgba(124,92,191,0.15);
  border-radius:12px;padding:0.6rem 0.9rem;
  display:flex;align-items:center;gap:0.6rem;
  font-size:0.72rem;color:var(--tdah);
}
.next-meal-bar strong{font-size:0.8rem}

/* Banners */
.livraison-banner,.batch-banner,.bday-banner{margin:0 1rem 0.7rem;border-radius:14px;padding:0.75rem 1rem;font-size:0.71rem;line-height:1.65}
.livraison-banner{background:linear-gradient(135deg,rgba(155,112,96,0.06),rgba(255,255,255,0.5));border:1px solid rgba(155,112,96,0.2);color:#6b3820}
.batch-banner{background:linear-gradient(135deg,rgba(212,168,67,0.07),rgba(255,255,255,0.5));border:1px solid rgba(212,168,67,0.2);color:#7a5800}
.bday-banner{background:linear-gradient(135deg,rgba(232,137,154,0.08),rgba(242,196,206,0.08));border:1px solid rgba(232,137,154,0.25);color:#8a2840}

/* Meal cards */
.panel-meals{padding:0 1rem;display:flex;flex-direction:column;gap:0.6rem}
.meal-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(58,40,32,0.06);border:1px solid rgba(58,40,32,0.05)}
.meal-card.bday-card{border-color:rgba(232,137,154,0.2);background:linear-gradient(180deg,#fff9fb,#fff)}
.meal-head{display:flex;align-items:center;gap:0.65rem;padding:0.75rem 0.9rem}
.miw{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.ic-mat{background:rgba(212,168,67,0.1)}.ic-mid{background:rgba(90,138,90,0.1)}
.ic-gou{background:rgba(242,196,206,0.35)}.ic-din{background:rgba(58,40,32,0.05)}
.ic-sna{background:rgba(232,137,154,0.1)}.ic-bday{background:linear-gradient(135deg,rgba(232,137,154,0.15),rgba(212,168,67,0.1))}
.meal-lbl{font-size:0.58rem;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;color:var(--muted)}
.meal-time{font-size:0.67rem;color:var(--muted);margin-top:0.08rem}

/* TDAH pause question */
.tdah-pause{
  background:var(--tdah-light);border-left:2px solid var(--tdah-mid);
  border-radius:0 8px 8px 0;
  padding:0.35rem 0.7rem;margin:0 0.9rem 0.5rem;
  font-size:0.67rem;color:var(--tdah);font-style:italic;
  display:flex;align-items:center;gap:0.4rem;
}

.meal-body{padding:0 0.9rem 0.9rem}
.meal-title{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:var(--text);margin-bottom:0.45rem;line-height:1.35}
.ingr-list{display:flex;flex-wrap:wrap;gap:0.28rem;margin-bottom:0.4rem}
.ingr{background:var(--bg);border-radius:2rem;padding:0.2rem 0.55rem;font-size:0.67rem;border:1px solid rgba(58,40,32,0.08);color:var(--text)}
.ingr.fr{border-color:rgba(90,138,90,0.3);color:var(--leaf-dark);background:rgba(90,138,90,0.05)}
.ingr.bd{border-color:rgba(232,137,154,0.3);color:var(--blossom-deep);background:rgba(232,137,154,0.05)}
.ntags{display:flex;flex-wrap:wrap;gap:0.25rem;margin-top:0.35rem}
.ntag{border-radius:2rem;padding:0.15rem 0.45rem;font-size:0.56rem;font-weight:700;letter-spacing:0.04em}
.nt-fer{background:rgba(155,112,96,0.12);color:var(--bark)}
.nt-mag{background:rgba(90,138,90,0.12);color:var(--leaf-dark)}
.nt-alk{background:rgba(168,200,154,0.2);color:#3a6a3a}
.nt-vitc{background:rgba(212,168,67,0.12);color:#8a6800}
.nt-fun{background:rgba(232,196,206,0.4);color:var(--blossom-deep)}
.nt-bday{background:rgba(232,137,154,0.12);color:var(--blossom-deep)}
.nt-dopa{background:rgba(224,120,64,0.12);color:var(--dopamine)}
.nt-tdah{background:rgba(124,92,191,0.1);color:var(--tdah)}

.conseil{margin-top:0.45rem;padding:0.4rem 0.65rem;border-radius:8px;font-size:0.68rem;line-height:1.5;display:flex;gap:0.35rem;align-items:flex-start}
